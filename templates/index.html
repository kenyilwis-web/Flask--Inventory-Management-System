<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <h1>Inventory Management</h1>

    <section id="inventory">
        <h2>Inventory</h2>
        <table id="inventory-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Inventory items will be dynamically added here -->
            </tbody>
        </table>

        <h3>Add New Item</h3>
        <form id="add-item-form">
            <input type="text" id="item-name" placeholder="Name" required>
            <input type="text" id="item-category" placeholder="Category" required>
            <button type="submit">Add Item</button>
        </form>
    </section>

    <section id="openfoodfacts">
        <h2>Search OpenFoodFacts</h2>
        <form id="search-form">
            <input type="text" id="search-query" placeholder="Search products" required>
            <button type="submit">Search</button>
        </form>
        <ul id="search-results">
            <!-- Search results will be dynamically added here -->
        </ul>
    </section>

    <script src="/static/scripts.js"></script>
</body>
</html>
